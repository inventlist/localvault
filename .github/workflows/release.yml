name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build gem
        run: gem build localvault.gemspec

      - name: Push to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push localvault-*.gem

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://github.com/inventlist/localvault/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"

          # Retry up to 5 times — GitHub may not have the tarball ready immediately
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sL --fail -o /tmp/tarball.tar.gz -w "%{http_code}" "$URL")
            if [ "$HTTP_CODE" = "200" ] && [ -s /tmp/tarball.tar.gz ]; then
              break
            fi
            echo "Attempt $i: tarball not ready (HTTP $HTTP_CODE), retrying in $((i * 5))s..."
            sleep $((i * 5))
          done

          if [ ! -s /tmp/tarball.tar.gz ]; then
            echo "ERROR: Failed to download tarball after 5 attempts"
            exit 1
          fi

          SHA256=$(shasum -a 256 /tmp/tarball.tar.gz | cut -d' ' -f1)
          echo "SHA256: $SHA256"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/inventlist/homebrew-tap.git" tap
          cd tap

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/localvault.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/localvault.rb

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/localvault.rb
          git commit -m "localvault ${VERSION}"
          git push

  smoke-test:
    needs: release
    runs-on: macos-latest

    steps:
      - name: Wait for tap to propagate
        run: sleep 10

      - name: Install from tap
        run: |
          brew tap inventlist/tap
          brew install inventlist/tap/localvault

      - name: Verify version
        run: |
          INSTALLED=$(localvault version)
          EXPECTED="localvault ${{ needs.release.outputs.version }}"
          echo "Installed: $INSTALLED"
          echo "Expected:  $EXPECTED"
          [ "$INSTALLED" = "$EXPECTED" ] || { echo "FAIL: version mismatch"; exit 1; }

      - name: Smoke test
        run: |
          export LOCALVAULT_HOME=$(mktemp -d)
          echo -e "testpass\ntestpass" | localvault init
          echo "Smoke test passed: init works"
          rm -rf "$LOCALVAULT_HOME"

      - name: Verify RubyGems install
        run: |
          gem install localvault -v "${{ needs.release.outputs.version }}"

          # Verify the binary runs
          GEM_VERSION=$(localvault version)
          echo "RubyGems binary: $GEM_VERSION"
          echo "$GEM_VERSION" | grep -q "${{ needs.release.outputs.version }}" || { echo "FAIL: gem binary version mismatch"; exit 1; }

          # Smoke test the gem-installed binary
          export LOCALVAULT_HOME=$(mktemp -d)
          echo -e "testpass\ntestpass" | localvault init
          echo "RubyGems smoke test passed"
          rm -rf "$LOCALVAULT_HOME"
